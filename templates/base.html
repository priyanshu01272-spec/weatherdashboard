<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherDash</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">🌤️ WeatherDash</a>
            <span class="nav-sub">Real-time weather for any city</span>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a> · Built with Flask</p>
    </footer>

</body>
</html>
